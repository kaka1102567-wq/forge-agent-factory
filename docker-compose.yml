services:
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge123
      POSTGRES_DB: forge
    volumes:
      - forge-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    volumes:
      - forge-redis:/data

volumes:
  forge-pgdata:
  forge-redis:
